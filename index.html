<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch || (typeof globalThis !== 'undefined' ? globalThis.fetch : null);
          if (originalFetch) {
            var currentFetch = originalFetch;
            var desc = {
              get: function() {
                return currentFetch;
              },
              set: function(value) {
                currentFetch = value;
              },
              configurable: true,
              enumerable: true
            };
            Object.defineProperty(window, 'fetch', desc);
            if (typeof globalThis !== 'undefined' && globalThis !== window) {
              Object.defineProperty(globalThis, 'fetch', desc);
            }
          }
        } catch (e) {
          // Fail silently
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
